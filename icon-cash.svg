<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="billA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6fd18a"/>
      <stop offset="100%" stop-color="#2e9e57"/>
    </linearGradient>
    <linearGradient id="billB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8be8a6"/>
      <stop offset="100%" stop-color="#3fb768"/>
    </linearGradient>
    <radialGradient id="coinG" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff6cf"/>
      <stop offset="100%" stop-color="#ffd23f"/>
    </radialGradient>
  </defs>
  <!-- back bill, rotated -->
  <g transform="rotate(-8 50 52)">
    <rect x="14" y="34" width="66" height="38" rx="4" fill="url(#billA)" stroke="#1c6b3a" stroke-width="1.5"/>
    <rect x="19" y="39" width="56" height="28" rx="2" fill="none" stroke="#eafff0" stroke-width="1" opacity="0.55"/>
  </g>
  <!-- front bill -->
  <g transform="rotate(6 50 52)">
    <rect x="16" y="36" width="68" height="38" rx="4" fill="url(#billB)" stroke="#1c6b3a" stroke-width="1.5"/>
    <rect x="21" y="41" width="58" height="28" rx="2" fill="none" stroke="#eafff0" stroke-width="1" opacity="0.6"/>
    <circle cx="50" cy="55" r="10" fill="none" stroke="#1c6b3a" stroke-width="1.4" opacity="0.7"/>
    <text x="50" y="60" text-anchor="middle" font-family="Space Grotesk, Arial, sans-serif" font-size="12" font-weight="700" fill="#1c6b3a" opacity="0.8">$</text>
  </g>
  <!-- gold coin, foreground -->
  <circle cx="74" cy="72" r="16" fill="url(#coinG)" stroke="#8a5a00" stroke-width="1.6"/>
  <text x="74" y="78" text-anchor="middle" font-family="Space Grotesk, Arial, sans-serif" font-size="17" font-weight="700" fill="#8a5a00">$</text>
</svg>
